{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-5 col-md-7">
    <div class="card">
      <div class="card-body p-5">
        <div class="text-center mb-4">
          <i class="fas fa-sign-in-alt fa-3x text-success mb-3"></i>
          <h2 class="card-title">Welcome Back</h2>
          <p class="text-muted">Sign in to your account</p>
        </div>
        <form method="post" action="{{ url_for('login') }}">
          <div class="mb-3">
            <label for="email" class="form-label">
              <i class="fas fa-envelope me-2"></i>Email address
            </label>
            <input type="email" class="form-control" id="email" name="email" required placeholder="Enter your email" value="{{ (form_data or {}).get('email', '') }}">
          </div>
          <div class="mb-4">
            <label for="password" class="form-label">
              <i class="fas fa-lock me-2"></i>Password
            </label>
            <input type="password" class="form-control" id="password" name="password" required placeholder="Enter your password">
          </div>
          <button type="submit" class="btn btn-success w-100 mb-3">
            <i class="fas fa-sign-in-alt me-2"></i>Login
          </button>
        </form>
        <p class="text-center mb-0">Don't have an account? <a href="{{ url_for('signup') }}" class="text-decoration-none">Sign up here</a></p>
      </div>
    </div>
  </div>
</div>
{% endblock %}
